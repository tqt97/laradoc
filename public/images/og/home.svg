<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0F172A"/>
  
  <!-- Grid Pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.05)"/>
    </pattern>
    <linearGradient id="primary-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EA580C" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Gradients -->
  <circle cx="0" cy="0" r="600" fill="url(#primary-gradient)"/>
  <circle cx="1200" cy="630" r="500" fill="rgba(234, 88, 12, 0.1)"/>

  <!-- Content -->
  <g transform="translate(100, 100)">
    <!-- Label -->
    <rect width="200" height="45" rx="22.5" fill="rgba(234, 88, 12, 0.2)" stroke="#EA580C" stroke-opacity="0.3"/>
    <text x="100" y="28" font-family="Be Vietnam Pro, sans-serif" font-size="20" font-weight="900" fill="#EA580C" text-anchor="middle" letter-spacing="0.2em">HOMEPAGE</text>
    
    <!-- Title -->
    <text x="0" y="160" font-family="Be Vietnam Pro, sans-serif" font-size="80" font-weight="900" fill="white">tuantq.online</text>
    <text x="0" y="240" font-family="Be Vietnam Pro, sans-serif" font-size="40" font-weight="900" fill="#EA580C">Blog Chia sẻ Kiến thức &amp;</text>
    <text x="0" y="300" font-family="Be Vietnam Pro, sans-serif" font-size="40" font-weight="900" fill="#EA580C">Kinh nghiệm Lập trình</text>
    
    <!-- Description -->
    <text x="0" y="380" font-family="Be Vietnam Pro, sans-serif" font-size="28" font-weight="500" fill="#94A3B8">Phát triển Web • Kiến trúc hệ thống • Ghi chép kỹ thuật</text>
    
    <!-- Branding Bottom -->
    <g transform="translate(0, 430)">
      <circle cx="25" cy="0" r="25" fill="#EA580C"/>
      <text x="70" y="10" font-family="Be Vietnam Pro, sans-serif" font-size="32" font-weight="900" fill="white">tuantq.online</text>
      
      <!-- Tech elements -->
      <rect x="800" y="-10" width="80" height="10" rx="5" fill="#EA580C"/>
      <circle cx="900" cy="-5" r="5" fill="rgba(234,88,12,0.5)"/>
      <circle cx="920" cy="-5" r="5" fill="rgba(234,88,12,0.2)"/>
    </g>
  </g>
</svg>
